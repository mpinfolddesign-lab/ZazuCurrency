<style>
    .cc-window {
        border: 1px solid #ddd;
        border-radius: 12px;
        max-width: 340px;
        width: calc(100% - 2rem);
        padding: 1rem;
        font-family: Arial, sans-serif;
        background: #fff;
    }

    .cc-subtitle {
        margin: 0 0 0.75rem;
        color: #666;
        font-size: 0.85rem;
    }

    .cc-title {
        margin: 0 0 0.75rem;
        font-size: 1rem;
    }

    .cc-row {
        display: flex;
        justify-content: space-between;
        margin: 0.35rem 0;
        font-size: 0.95rem;
    }

    .cc-label {
        color: #555;
    }

    .cc-value {
        font-weight: 700;
    }
</style>

<div class="cc-window" id="ccWindow" aria-labelledby="ccTitle">
    <h2 class="cc-title" id="ccTitle">10 GBP Conversion</h2>
    <p class="cc-subtitle">Live rates (updates every 60s)</p>

    <div class="cc-row">
        <span class="cc-label">USD</span>
        <span class="cc-value" id="usdValue"></span>
    </div>

    <div class="cc-row">
        <span class="cc-label">EUR</span>
        <span class="cc-value" id="eurValue"></span>
    </div>
</div>

<script>
    const amountGBP = 10;
    const refreshIntervalMs = 60_000;
    const fallbackRates = {
        USD: 1.27,
        EUR: 1.17
    };
    const liveRatesUrl = 'https://api.frankfurter.app/latest?from=GBP&to=USD,EUR';

    const usdValue = document.getElementById('usdValue');
    const eurValue = document.getElementById('eurValue');

    function formatCurrency(value, currency) {
        return new Intl.NumberFormat('en-GB', {
            style: 'currency',
            currency,
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }).format(value);
    }

    function setConvertedValues(rates) {
        const usd = amountGBP * rates.USD;
        const eur = amountGBP * rates.EUR;
        usdValue.textContent = formatCurrency(usd, 'USD');
        eurValue.textContent = formatCurrency(eur, 'EUR');
    }

    async function getLiveRates() {
        const response = await fetch(liveRatesUrl);
        if (!response.ok) {
            throw new Error('Failed to fetch live rates');
        }

        const data = await response.json();
        if (!data.rates || typeof data.rates.USD !== 'number' || typeof data.rates.EUR !== 'number') {
            throw new Error('Live rates payload was invalid');
        }

        return data.rates;
    }

    async function updateConversions() {
        usdValue.textContent = 'Loading...';
        eurValue.textContent = 'Loading...';

        try {
            const liveRates = await getLiveRates();
            setConvertedValues(liveRates);
        } catch {
            setConvertedValues(fallbackRates);
        }
    }

    updateConversions();
    setInterval(updateConversions, refreshIntervalMs);
</script>
