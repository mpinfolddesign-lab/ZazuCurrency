<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <style>
        :root {
            --primary: #D85B7D;
            --background: #F6EFE8;
            --card-bg: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --border: #E0D5CB;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
            background: var(--background);
            font-family: 'Roboto Slab', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, serif;
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .cc-window {
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 340px;
            width: 100%;
            padding: 24px;
            background: var(--card-bg);
            box-shadow: 0 4px 16px var(--shadow);
            box-sizing: border-box;
        }

        .cc-subtitle {
            margin: 0 0 0.75rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .cc-title {
            margin: 0 0 0.75rem;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .cc-row {
            display: flex;
            justify-content: space-between;
            margin: 0.5rem 0;
            font-size: 0.95rem;
        }

        .cc-label {
            color: var(--text-secondary);
        }

        .cc-value {
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="cc-window" id="ccWindow" aria-labelledby="ccTitle">
        <h2 class="cc-title" id="ccTitle">£ Conversion</h2>
        <p class="cc-subtitle">Live rates (updates every 60s)</p>

        <div class="cc-row">
            <span class="cc-label">USD</span>
            <span class="cc-value" id="usdValue"></span>
        </div>

        <div class="cc-row">
            <span class="cc-label">EUR</span>
            <span class="cc-value" id="eurValue"></span>
        </div>
    </div>

    <script>
        const amountGBP = 10;
        const refreshIntervalMs = 60_000;
        const fallbackRates = {
            USD: 1.27,
            EUR: 1.17
        };
        const liveRatesUrl = 'https://api.frankfurter.app/latest?from=GBP&to=USD,EUR';

        const usdValue = document.getElementById('usdValue');
        const eurValue = document.getElementById('eurValue');

        function formatCurrency(value, currency) {
            return new Intl.NumberFormat('en-GB', {
                style: 'currency',
                currency,
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        function setConvertedValues(rates) {
            const usd = amountGBP * rates.USD;
            const eur = amountGBP * rates.EUR;
            usdValue.textContent = formatCurrency(usd, 'USD');
            eurValue.textContent = formatCurrency(eur, 'EUR');
        }

        async function getLiveRates() {
            const response = await fetch(liveRatesUrl);
            if (!response.ok) {
                throw new Error('Failed to fetch live rates');
            }

            const data = await response.json();
            if (!data.rates || typeof data.rates.USD !== 'number' || typeof data.rates.EUR !== 'number') {
                throw new Error('Live rates payload was invalid');
            }

            return data.rates;
        }

        async function updateConversions() {
            usdValue.textContent = 'Loading...';
            eurValue.textContent = 'Loading...';

            try {
                const liveRates = await getLiveRates();
                setConvertedValues(liveRates);
            } catch {
                setConvertedValues(fallbackRates);
            }
        }

        updateConversions();
        setInterval(updateConversions, refreshIntervalMs);
    </script>
</body>

</html>
